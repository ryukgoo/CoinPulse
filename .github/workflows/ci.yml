name: CI

on:
    pull_request:
        branches: [ main ]
    push:
        branches: [ main ]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Run Detekt
              run: ./gradlew detekt

            - name: Run Ktlint
              run: ./gradlew ktlintCheck

            - name: Upload Detekt Report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: detekt-report
                  path: composeApp/build/reports/detekt/

    build-android:
        name: Build Android
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Cache Kotlin/Native
              uses: actions/cache@v4
              with:
                  path: ~/.konan
                  key: konan-${{ runner.os }}-${{ hashFiles('**/*.toml') }}
                  restore-keys: konan-${{ runner.os }}-

            - name: Build Android Debug
              run: ./gradlew :composeApp:assembleDebug

    build-desktop:
        name: Build Desktop
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Cache Kotlin/Native
              uses: actions/cache@v4
              with:
                  path: ~/.konan
                  key: konan-${{ runner.os }}-${{ hashFiles('**/*.toml') }}
                  restore-keys: konan-${{ runner.os }}-

            - name: Build Desktop
              run: ./gradlew :composeApp:desktopJar

    build-web:
        name: Build Web
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Cache Kotlin/Native
              uses: actions/cache@v4
              with:
                  path: ~/.konan
                  key: konan-${{ runner.os }}-${{ hashFiles('**/*.toml') }}
                  restore-keys: konan-${{ runner.os }}-

            - name: Build Web
              run: ./gradlew :composeApp:wasmJsBrowserDistribution

    build-ios:
        name: Build iOS
        runs-on: macos-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Cache Kotlin/Native
              uses: actions/cache@v4
              with:
                  path: ~/.konan
                  key: konan-${{ runner.os }}-${{ hashFiles('**/*.toml') }}
                  restore-keys: konan-${{ runner.os }}-

            - name: Build iOS Framework
              run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3

            - name: Run Tests
              run: ./gradlew :composeApp:allTests
